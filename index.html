<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
    <title>口袋书签 | 拖动排序 + 极简详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 清新浅色主题 */
        :root {
            --bg-page: #f5f5f7;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --bg-folder-card: #ffffff;
            --bg-hover: #f2f2f6;
            --text-primary: #1c1c1e;
            --text-secondary: #3a3a3c;
            --text-muted: #8e8e93;
            --border-light: #e5e5ea;
            --accent: #007aff;
            --accent-hover: #005fc1;
            --danger: #ff3b30;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --drag-over: #e0e7ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.4;
            padding: 16px 12px;
            padding-bottom: 40px;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 头部导航栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 8px 0;
        }
        .logo-area h1 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #5e5ce0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: var(--bg-surface);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            color: var(--accent);
            border: 0.5px solid var(--border-light);
            transition: all 0.1s;
        }
        .icon-btn:active {
            transform: scale(0.94);
            background: var(--bg-hover);
        }

        /* 文件夹列表 - 垂直拖动 */
        .folders-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }
        .folder-row {
            background: var(--bg-folder-card);
            border-radius: 18px;
            border: 0.5px solid var(--border-light);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: var(--shadow-sm);
            user-select: none;
        }
        .folder-row.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }
        .folder-row.drag-over {
            border-top: 2px solid var(--accent);
            margin-top: -2px;
        }
        .folder-row:active {
            transform: scale(0.98);
        }
        .folder-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }
        /* 拖拽把手 (编辑模式下显示) */
        .drag-handle {
            display: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: grab;
            margin-right: 6px;
            touch-action: none;
        }
        body.edit-mode .drag-handle {
            display: block;
        }
        body.edit-mode .drag-handle:active {
            cursor: grabbing;
        }
        .folder-icon-img {
            width: 48px;
            height: 48px;
            background: var(--bg-hover);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        .folder-icon-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .folder-info {
            flex: 1;
        }
        .folder-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .folder-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .folder-edit-icon {
            background: none;
            border: none;
            font-size: 1.1rem;
            padding: 8px;
            border-radius: 30px;
            color: var(--text-muted);
            cursor: pointer;
            display: none;
        }
        body.edit-mode .folder-edit-icon {
            display: block;
        }
        .add-folder-row {
            background: transparent;
            border: 1.5px dashed var(--border-light);
            justify-content: center;
            gap: 8px;
            color: var(--accent);
        }
        .add-folder-row .folder-left {
            justify-content: center;
        }

        /* 详情页布局: 无分类图标，返回按钮区域整合 */
        .detail-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .back-button {
            background: var(--bg-surface);
            border: 0.5px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--accent);
        }
        /* 右上角纯图标编辑按钮（无文字） */
        .detail-edit-icon {
            background: var(--bg-surface);
            border: 0.5px solid var(--border-light);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--accent);
        }
        .add-bookmark-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        body.edit-mode .add-bookmark-btn {
            display: flex;
        }

        /* 书签网格 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .bookmark-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 0.5px solid var(--border-light);
            padding: 12px 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .bookmark-card:active {
            transform: scale(0.98);
        }
        .bookmark-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-hover);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .bookmark-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .bookmark-info {
            flex: 1;
            min-width: 0;
        }
        .bookmark-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .bookmark-title a {
            color: var(--text-primary);
            text-decoration: none;
        }
        .bookmark-desc {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .bookmark-edit-icon {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--bg-surface);
            border-radius: 20px;
            width: 28px;
            height: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            border: 0.5px solid var(--border-light);
            z-index: 2;
        }
        body.edit-mode .bookmark-edit-icon {
            display: flex;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            background: var(--bg-surface);
            border-radius: 28px;
            grid-column: span 2;
        }

        /* 弹窗通用 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-card {
            background: var(--bg-surface);
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 0.5px solid var(--border-light);
        }
        .modal-card h3 {
            font-size: 1.4rem;
            margin-bottom: 18px;
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 0.5px solid var(--border-light);
            background: var(--bg-page);
            font-size: 0.95rem;
        }
        .icon-upload-area {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .icon-preview {
            width: 52px;
            height: 52px;
            background: var(--bg-hover);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            overflow: hidden;
        }
        .upload-small-btn {
            background: var(--bg-hover);
            border: 0.5px solid var(--border-light);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }
        .modal-buttons button {
            padding: 8px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: var(--bg-hover); color: var(--text-primary); }
        .footer-tip {
            margin-top: 32px;
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            border-top: 0.5px solid var(--border-light);
            padding-top: 18px;
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<!-- 分类编辑弹窗 -->
<div id="folderModal" class="modal">
    <div class="modal-card">
        <h3>编辑文件夹</h3>
        <input type="text" id="folderNameInput" placeholder="文件夹名称">
        <div class="icon-upload-area">
            <div class="icon-preview" id="folderIconPreview">📁</div>
            <input type="file" id="folderIconFile" accept="image/*" style="display: none;">
            <button type="button" class="upload-small-btn" id="uploadFolderIconBtn">上传图标</button>
            <button type="button" class="upload-small-btn" id="clearFolderIconBtn">清除</button>
        </div>
        <div class="modal-buttons">
            <button class="btn-danger" id="deleteFolderBtn">删除文件夹</button>
            <button class="btn-secondary" id="cancelFolderModal">取消</button>
            <button class="btn-primary" id="saveFolderModal">保存</button>
        </div>
    </div>
</div>

<!-- 书签编辑弹窗 -->
<div id="bookmarkModal" class="modal">
    <div class="modal-card">
        <h3 id="bookmarkModalTitle">添加书签</h3>
        <input type="text" id="bookmarkTitle" placeholder="标题 *">
        <input type="text" id="bookmarkUrl" placeholder="网址 https://...">
        <textarea id="bookmarkDesc" rows="2" placeholder="描述 (可选)"></textarea>
        <div class="icon-upload-area">
            <div class="icon-preview" id="bookmarkIconPreview">🔖</div>
            <input type="file" id="bookmarkIconFile" accept="image/*" style="display: none;">
            <button type="button" class="upload-small-btn" id="uploadBookmarkIconBtn">上传图标</button>
            <button type="button" class="upload-small-btn" id="clearBookmarkIconBtn">清除</button>
        </div>
        <div class="modal-buttons">
            <button class="btn-danger" id="deleteBookmarkBtn">删除</button>
            <button class="btn-secondary" id="cancelBookmarkModal">取消</button>
            <button class="btn-primary" id="saveBookmarkBtn">保存</button>
        </div>
    </div>
</div>

<script>
    // ---------- 数据 ----------
    let categories = [];      // { id, name, customIcon }
    let bookmarks = [];       // { id, categoryId, title, url, description, customIcon }
    let currentCategoryId = null;
    let editMode = false;
    let viewState = 'folders';   // 'folders' or 'detail'

    // 拖拽相关
    let dragSrcIndex = null;
    let dragOverIndex = null;

    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }

    // 工具函数
    function getGoogleFavicon(url) {
        if (!url || url === '#') return null;
        try {
            let hostname = '';
            if (url.startsWith('http')) hostname = new URL(url).hostname;
            else hostname = url.split('/')[0];
            if (!hostname) return null;
            return `https://t3.gstatic.cn/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&size=64&url=https://${hostname}`;
        } catch(e) { return null; }
    }
    function getFirstLetter(str) {
        if (!str) return '📄';
        let first = str.trim().charAt(0);
        if (/[\u4e00-\u9fa5a-zA-Z0-9]/.test(first)) return first.toUpperCase();
        return '🔖';
    }
    function loadBookmarkIcon(cardElement, bookmark) {
        const iconDiv = cardElement.querySelector('.bookmark-icon');
        if (!iconDiv) return;
        if (bookmark.customIcon && bookmark.customIcon.startsWith('data:image')) {
            iconDiv.innerHTML = '';
            const img = document.createElement('img');
            img.src = bookmark.customIcon;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            iconDiv.appendChild(img);
            return;
        }
        const favUrl = getGoogleFavicon(bookmark.url);
        if (favUrl) {
            const img = new Image();
            img.onload = () => {
                iconDiv.innerHTML = '';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'contain';
                iconDiv.appendChild(img);
            };
            img.onerror = () => { iconDiv.innerHTML = getFirstLetter(bookmark.title); iconDiv.style.fontSize = '26px'; };
            img.src = favUrl;
        } else {
            iconDiv.innerHTML = getFirstLetter(bookmark.title);
            iconDiv.style.fontSize = '26px';
        }
    }

    function saveData() {
        localStorage.setItem('folder_categories_sortable', JSON.stringify(categories));
        localStorage.setItem('folder_bookmarks_sortable', JSON.stringify(bookmarks));
    }
    function loadData() {
        const storedCats = localStorage.getItem('folder_categories_sortable');
        const storedBookmarks = localStorage.getItem('folder_bookmarks_sortable');
        if (storedCats) categories = JSON.parse(storedCats);
        else categories = [
            { id: genId(), name: "常用网站" },
            { id: genId(), name: "开发工具" },
            { id: genId(), name: "资讯阅读" }
        ];
        if (storedBookmarks) bookmarks = JSON.parse(storedBookmarks);
        else {
            const defaultId = categories[0]?.id;
            bookmarks = [
                { id: genId(), categoryId: defaultId, title: "Google", url: "https://www.google.com", description: "全球搜索" },
                { id: genId(), categoryId: defaultId, title: "GitHub", url: "https://github.com", description: "开源社区" },
                { id: genId(), categoryId: categories[1]?.id, title: "MDN", url: "https://developer.mozilla.org", description: "Web 文档" }
            ];
        }
        if (!categories.length) categories = [{ id: genId(), name: "我的书签" }];
        if (!currentCategoryId && categories.length) currentCategoryId = categories[0].id;
        saveData();
    }

    function getBookmarkCount(catId) { return bookmarks.filter(b => b.categoryId === catId).length; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // ---------- 拖动排序逻辑 ----------
    function attachDragEvents() {
        const rows = document.querySelectorAll('.folder-row:not(.add-folder-row)');
        rows.forEach((row, idx) => {
            row.setAttribute('data-index', idx);
            // 触摸/鼠标拖动：仅在编辑模式下且点击 drag-handle 时启动
            const handle = row.querySelector('.drag-handle');
            if (!handle) return;
            handle.addEventListener('touchstart', (e) => { if (editMode) dragStart(e, idx); });
            handle.addEventListener('mousedown', (e) => { if (editMode) dragStart(e, idx); });
            // 为了让 drop 有效，需要阻止 dragover 默认行为，我们自定义
            row.addEventListener('dragover', (e) => { if (editMode) e.preventDefault(); });
            row.addEventListener('dragstart', (e) => { if (editMode) dragStartEvent(e, idx); });
            row.addEventListener('dragend', (e) => { if (editMode) dragEndEvent(e); });
            row.addEventListener('dragenter', (e) => { if (editMode) dragEnterEvent(e, idx); });
        });
    }

    function dragStart(e, idx) {
        if (!editMode) return;
        dragSrcIndex = idx;
        e.dataTransfer?.setData('text/plain', idx);
        e.target?.setAttribute('draggable', 'true');
    }
    function dragStartEvent(e, idx) {
        if (!editMode) { e.preventDefault(); return false; }
        dragSrcIndex = idx;
        e.dataTransfer.setData('text/plain', idx);
        e.dataTransfer.effectAllowed = 'move';
    }
    function dragEnterEvent(e, idx) {
        if (!editMode || dragSrcIndex === null) return;
        e.preventDefault();
        if (dragSrcIndex !== idx) {
            dragOverIndex = idx;
            reorderCategories(dragSrcIndex, dragOverIndex);
            dragSrcIndex = dragOverIndex;
            dragOverIndex = null;
        }
    }
    function dragEndEvent(e) {
        dragSrcIndex = null;
        dragOverIndex = null;
        renderFoldersView(); // 刷新确保顺序
    }
    // 实际重排
    function reorderCategories(from, to) {
        if (from === to) return;
        const moved = categories[from];
        categories.splice(from, 1);
        categories.splice(to, 0, moved);
        saveData();
        renderFoldersView(); // 立即刷新并重新绑定事件
    }

    // 渲染文件夹主视图 (可拖动)
    function renderFoldersView() {
        const container = document.getElementById('appRoot');
        let html = `
            <div class="header">
                <div class="logo-area"><h1>📁 口袋书签</h1></div>
                <div class="header-actions">
                    <button class="icon-btn" id="modeToggleBtn" title="编辑模式">${editMode ? '✅' : '✏️'}</button>
                </div>
            </div>
            <div class="folders-list" id="foldersList"></div>
            <div class="footer-tip">编辑模式下可拖动文件夹排序，点击文件夹进入详情</div>
        `;
        container.innerHTML = html;
        const foldersList = document.getElementById('foldersList');
        foldersList.innerHTML = '';
        categories.forEach((cat, idx) => {
            const count = getBookmarkCount(cat.id);
            const iconHtml = cat.customIcon && cat.customIcon.startsWith('data:image') 
                ? `<img src="${cat.customIcon}" style="width:100%;height:100%;object-fit:cover">` 
                : `<span style="font-size:28px;">📂</span>`;
            const row = document.createElement('div');
            row.className = 'folder-row';
            row.setAttribute('draggable', editMode ? 'true' : 'false');
            row.setAttribute('data-idx', idx);
            row.innerHTML = `
                <div style="display:flex; align-items:center; width:100%;">
                    <div class="drag-handle" style="touch-action: none;">⋮⋮</div>
                    <div class="folder-left">
                        <div class="folder-icon-img">${iconHtml}</div>
                        <div class="folder-info">
                            <div class="folder-name">${escapeHtml(cat.name)}</div>
                            <div class="folder-count">${count} 个书签</div>
                        </div>
                    </div>
                    <button class="folder-edit-icon" data-id="${cat.id}" data-name="${escapeHtml(cat.name)}" data-icon="${cat.customIcon || ''}">✏️</button>
                </div>
            `;
            // 点击进入详情
            row.addEventListener('click', (e) => {
                if (e.target.classList.contains('folder-edit-icon') || e.target.classList.contains('drag-handle')) return;
                currentCategoryId = cat.id;
                viewState = 'detail';
                renderDetailView();
            });
            const editBtn = row.querySelector('.folder-edit-icon');
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openFolderEditModal(cat.id, cat.name, cat.customIcon);
            });
            // 拖拽事件
            if (editMode) {
                row.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', idx);
                    e.dataTransfer.effectAllowed = 'move';
                    dragSrcIndex = idx;
                });
                row.addEventListener('dragover', (e) => { e.preventDefault(); });
                row.addEventListener('dragenter', (e) => { e.preventDefault(); if (dragSrcIndex !== null && dragSrcIndex !== idx) reorderCategories(dragSrcIndex, idx); dragSrcIndex = idx; });
                row.addEventListener('dragend', () => { dragSrcIndex = null; renderFoldersView(); });
            }
            foldersList.appendChild(row);
        });
        // 添加分类行
        const addRow = document.createElement('div');
        addRow.className = 'folder-row add-folder-row';
        addRow.innerHTML = `<div class="folder-left" style="justify-content:center; gap:8px;"><span style="font-size:22px;">➕</span><span>新建文件夹</span></div>`;
        addRow.addEventListener('click', () => addNewCategory());
        foldersList.appendChild(addRow);
        document.getElementById('modeToggleBtn').addEventListener('click', () => { editMode = !editMode; saveEditMode(); renderFoldersView(); });
    }

    // 详情视图：无分类图标，返回按钮处显示文件夹名
    function renderDetailView() {
        const currentCat = categories.find(c => c.id === currentCategoryId);
        if (!currentCat) { viewState = 'folders'; renderFoldersView(); return; }
        const filtered = bookmarks.filter(b => b.categoryId === currentCategoryId);
        let bookmarksHtml = '';
        if (filtered.length === 0) bookmarksHtml = `<div class="empty-state">✨ 暂无书签，点击「编辑模式」后添加</div>`;
        else bookmarksHtml = `<div class="bookmarks-grid" id="bookmarksGrid"></div>`;
        const container = document.getElementById('appRoot');
        container.innerHTML = `
            <div class="detail-header-bar">
                <div class="back-button" id="backToFoldersBtn">← ${escapeHtml(currentCat.name)}</div>
                <div class="detail-edit-icon" id="detailModeToggleBtn">${editMode ? '✅' : '✏️'}</div>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
                <button class="add-bookmark-btn" id="detailAddBookmarkBtn">➕ 新书签</button>
            </div>
            <div id="detailBookmarksContainer">${bookmarksHtml}</div>
        `;
        if (filtered.length > 0) {
            const grid = document.getElementById('bookmarksGrid');
            grid.innerHTML = '';
            filtered.forEach(book => {
                const card = document.createElement('div');
                card.className = 'bookmark-card';
                card.innerHTML = `
                    <div class="bookmark-icon"></div>
                    <div class="bookmark-info">
                        <div class="bookmark-title"><a href="${escapeHtml(book.url)}" target="_blank">${escapeHtml(book.title)}</a></div>
                        <div class="bookmark-desc">${book.description ? escapeHtml(book.description) : '暂无描述'}</div>
                    </div>
                    <div class="bookmark-edit-icon" data-id="${book.id}">✏️</div>
                `;
                grid.appendChild(card);
                loadBookmarkIcon(card, book);
                const editIcon = card.querySelector('.bookmark-edit-icon');
                editIcon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openBookmarkModal(book.id);
                });
                card.addEventListener('click', (e) => {
                    if (e.target === editIcon || editIcon.contains(e.target)) return;
                    if (book.url && book.url !== '#') window.open(book.url, '_blank');
                });
            });
        }
        document.getElementById('backToFoldersBtn').addEventListener('click', () => { viewState = 'folders'; renderFoldersView(); });
        document.getElementById('detailModeToggleBtn').addEventListener('click', () => { editMode = !editMode; saveEditMode(); renderDetailView(); });
        const addBtn = document.getElementById('detailAddBookmarkBtn');
        if (addBtn) addBtn.addEventListener('click', () => openBookmarkModal(null));
        applyDetailEditModeStyle();
    }

    function applyDetailEditModeStyle() {
        if (editMode) document.body.classList.add('edit-mode');
        else document.body.classList.remove('edit-mode');
    }
    function saveEditMode() { localStorage.setItem('folder_edit_mode_sort', editMode); applyDetailEditModeStyle(); }

    // 文件夹弹窗 (上传图标)
    let editingFolderId = null;
    let tempFolderIcon = null;
    const folderModal = document.getElementById('folderModal');
    const folderNameInput = document.getElementById('folderNameInput');
    const folderIconPreview = document.getElementById('folderIconPreview');
    const folderIconFile = document.getElementById('folderIconFile');
    function openFolderEditModal(id, name, currentIcon) {
        editingFolderId = id;
        folderNameInput.value = name;
        tempFolderIcon = currentIcon || null;
        if (tempFolderIcon && tempFolderIcon.startsWith('data:image')) {
            folderIconPreview.innerHTML = '';
            const img = document.createElement('img');
            img.src = tempFolderIcon;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            folderIconPreview.appendChild(img);
        } else { folderIconPreview.innerHTML = '📁'; folderIconPreview.style.fontSize = '32px'; }
        folderModal.style.display = 'flex';
    }
    function closeFolderModal() { folderModal.style.display = 'none'; editingFolderId = null; tempFolderIcon = null; }
    function saveFolderEdit() {
        const newName = folderNameInput.value.trim();
        if (!newName) return alert("名称不能为空");
        const cat = categories.find(c => c.id === editingFolderId);
        if (cat) { cat.name = newName; if (tempFolderIcon) cat.customIcon = tempFolderIcon; else delete cat.customIcon; }
        saveData();
        if (viewState === 'folders') renderFoldersView(); else renderDetailView();
        closeFolderModal();
    }
    function deleteFolder() {
        if (categories.length === 1) return alert("至少保留一个分类");
        if (confirm(`删除文件夹及其中的所有书签？`)) {
            bookmarks = bookmarks.filter(b => b.categoryId !== editingFolderId);
            categories = categories.filter(c => c.id !== editingFolderId);
            if (currentCategoryId === editingFolderId) currentCategoryId = categories[0]?.id;
            saveData();
            if (viewState === 'folders') renderFoldersView(); else { viewState = 'folders'; renderFoldersView(); }
            closeFolderModal();
        }
    }
    function handleFolderIconUpload() {
        const file = folderIconFile.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            tempFolderIcon = e.target.result;
            folderIconPreview.innerHTML = '';
            const img = document.createElement('img');
            img.src = tempFolderIcon;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            folderIconPreview.appendChild(img);
        };
        reader.readAsDataURL(file);
    }
    function clearFolderIcon() { tempFolderIcon = null; folderIconPreview.innerHTML = '📁'; folderIconPreview.style.fontSize = '32px'; }

    // 书签弹窗
    let editingBookId = null;
    let tempBookIcon = null;
    const bookmarkModal = document.getElementById('bookmarkModal');
    const bookmarkTitleInput = document.getElementById('bookmarkTitle');
    const bookmarkUrlInput = document.getElementById('bookmarkUrl');
    const bookmarkDescInput = document.getElementById('bookmarkDesc');
    const bookmarkIconPreview = document.getElementById('bookmarkIconPreview');
    const bookmarkIconFile = document.getElementById('bookmarkIconFile');
    function openBookmarkModal(bookId = null) {
        editingBookId = bookId;
        tempBookIcon = null;
        if (bookId === null) {
            document.getElementById('bookmarkModalTitle').innerText = '添加书签';
            bookmarkTitleInput.value = ''; bookmarkUrlInput.value = ''; bookmarkDescInput.value = '';
            bookmarkIconPreview.innerHTML = '🔖'; bookmarkIconPreview.style.fontSize = '28px';
            document.getElementById('deleteBookmarkBtn').style.opacity = '0.5'; document.getElementById('deleteBookmarkBtn').style.pointerEvents = 'none';
        } else {
            const book = bookmarks.find(b => b.id === bookId);
            if (book) {
                document.getElementById('bookmarkModalTitle').innerText = '编辑书签';
                bookmarkTitleInput.value = book.title; bookmarkUrlInput.value = book.url; bookmarkDescInput.value = book.description || '';
                if (book.customIcon && book.customIcon.startsWith('data:image')) {
                    bookmarkIconPreview.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = book.customIcon;
                    img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover';
                    bookmarkIconPreview.appendChild(img);
                    tempBookIcon = book.customIcon;
                } else { bookmarkIconPreview.innerHTML = getFirstLetter(book.title); bookmarkIconPreview.style.fontSize = '28px'; }
            }
            document.getElementById('deleteBookmarkBtn').style.opacity = '1'; document.getElementById('deleteBookmarkBtn').style.pointerEvents = 'auto';
        }
        bookmarkModal.style.display = 'flex';
    }
    function closeBookmarkModal() { bookmarkModal.style.display = 'none'; editingBookId = null; tempBookIcon = null; }
    function saveBookmark() {
        const title = bookmarkTitleInput.value.trim(); const url = bookmarkUrlInput.value.trim(); const desc = bookmarkDescInput.value.trim();
        if (!title || !url) { alert("标题和网址不能为空"); return; }
        const newData = { title, url, description: desc }; if (tempBookIcon) newData.customIcon = tempBookIcon; else newData.customIcon = null;
        if (editingBookId === null) bookmarks.push({ id: genId(), categoryId: currentCategoryId, ...newData });
        else { const idx = bookmarks.findIndex(b => b.id === editingBookId); if (idx !== -1) bookmarks[idx] = { ...bookmarks[idx], ...newData }; }
        saveData(); if (viewState === 'detail') renderDetailView(); closeBookmarkModal();
    }
    function deleteBookmark() {
        if (editingBookId === null) return;
        if (confirm("永久删除该书签？")) { bookmarks = bookmarks.filter(b => b.id !== editingBookId); saveData(); if (viewState === 'detail') renderDetailView(); closeBookmarkModal(); }
    }
    function handleBookmarkIconUpload() {
        const file = bookmarkIconFile.files[0]; if (!file) return;
        const reader = new FileReader(); reader.onload = (e) => { tempBookIcon = e.target.result; bookmarkIconPreview.innerHTML = ''; const img = document.createElement('img'); img.src = tempBookIcon; img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover'; bookmarkIconPreview.appendChild(img); }; reader.readAsDataURL(file);
    }
    function clearBookmarkIcon() { tempBookIcon = null; const titleVal = bookmarkTitleInput.value.trim(); bookmarkIconPreview.innerHTML = getFirstLetter(titleVal || '🔖'); bookmarkIconPreview.style.fontSize = '28px'; }
    function addNewCategory() { let newName = prompt("输入文件夹名称", "新文件夹"); if (newName && newName.trim()) { categories.push({ id: genId(), name: newName.trim() }); saveData(); if (viewState === 'folders') renderFoldersView(); } }

    function bindModals() {
        document.getElementById('uploadFolderIconBtn').addEventListener('click', () => folderIconFile.click());
        document.getElementById('clearFolderIconBtn').addEventListener('click', clearFolderIcon);
        folderIconFile.addEventListener('change', handleFolderIconUpload);
        document.getElementById('saveFolderModal').addEventListener('click', saveFolderEdit);
        document.getElementById('cancelFolderModal').addEventListener('click', closeFolderModal);
        document.getElementById('deleteFolderBtn').addEventListener('click', deleteFolder);
        document.getElementById('uploadBookmarkIconBtn').addEventListener('click', () => bookmarkIconFile.click());
        document.getElementById('clearBookmarkIconBtn').addEventListener('click', clearBookmarkIcon);
        bookmarkIconFile.addEventListener('change', handleBookmarkIconUpload);
        document.getElementById('saveBookmarkBtn').addEventListener('click', saveBookmark);
        document.getElementById('cancelBookmarkModal').addEventListener('click', closeBookmarkModal);
        document.getElementById('deleteBookmarkBtn').addEventListener('click', deleteBookmark);
        folderModal.addEventListener('click', (e) => { if (e.target === folderModal) closeFolderModal(); });
        bookmarkModal.addEventListener('click', (e) => { if (e.target === bookmarkModal) closeBookmarkModal(); });
    }

    function init() {
        loadData();
        editMode = localStorage.getItem('folder_edit_mode_sort') === 'true';
        applyDetailEditModeStyle();
        bindModals();
        viewState = 'folders';
        renderFoldersView();
    }
    init();
</script>
</body>
</html>
