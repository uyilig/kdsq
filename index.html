<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
    <title>口袋书签 | 坚果云同步</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-page: #f5f5f7;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --bg-folder-card: #ffffff;
            --bg-hover: #f2f2f6;
            --text-primary: #1c1c1e;
            --text-secondary: #3a3a3c;
            --text-muted: #8e8e93;
            --border-light: #e5e5ea;
            --accent: #007aff;
            --danger: #ff3b30;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.4;
            padding: 16px 12px;
            padding-bottom: 40px;
        }
        .app-container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 8px 0; }
        .logo-area h1 { font-size: 1.7rem; font-weight: 600; background: linear-gradient(135deg, var(--accent), #5e5ce0); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .icon-btn { background: var(--bg-surface); border: none; width: 44px; height: 44px; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); color: var(--accent); border: 0.5px solid var(--border-light); transition: 0.1s; touch-action: manipulation; }
        .icon-btn:active { transform: scale(0.94); background: var(--bg-hover); }
        
        /* 向左的铅笔 SVG 图标 */
        .pencil-svg {
            width: 22px;
            height: 22px;
            display: block;
        }
        
        /* 两列宽长方形文件夹网格 */
        .folders-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }
        .folder-card {
            background: var(--bg-folder-card);
            border-radius: 20px;
            border: 0.5px solid var(--border-light);
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: 0.1s;
            position: relative;
        }
        .folder-card:active { transform: scale(0.97); }
        .folder-card.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        .folder-card.active .folder-name,
        .folder-card.active .folder-count {
            color: white;
        }
        .folder-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .folder-icon img {
            width: 44px;
            height: 44px;
            object-fit: cover;
        }
        .folder-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .folder-count {
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        .folder-edit-icon {
            position: absolute;
            top: 8px;
            right: 10px;
            background: rgba(0,0,0,0.06);
            border-radius: 20px;
            width: 28px;
            height: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
        }
        body.edit-mode .folder-edit-icon {
            display: flex;
        }
        .folder-card.active .folder-edit-icon {
            color: white;
            background: rgba(255,255,255,0.2);
        }
        /* 新建文件夹按钮 - 编辑模式下显示 */
        .add-folder-btn {
            background: transparent;
            border: 1.5px dashed var(--border-light);
            border-radius: 20px;
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--accent);
            cursor: pointer;
            transition: 0.1s;
        }
        .add-folder-btn:active { transform: scale(0.97); }
        .add-folder-btn .folder-icon { font-size: 1.8rem; margin-bottom: 0; }
        .add-folder-btn .folder-name { color: var(--accent); font-size: 0.85rem; }
        body.edit-mode .add-folder-btn { display: flex; }
        body:not(.edit-mode) .add-folder-btn { display: none; }

        .detail-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .back-button {
            background: var(--bg-surface);
            border: 0.5px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--accent);
        }
        .detail-edit-icon {
            background: var(--bg-surface);
            border: 0.5px solid var(--border-light);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent);
        }
        .add-bookmark-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        body.edit-mode .add-bookmark-btn { display: flex; }
        .bookmarks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .bookmark-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 0.5px solid var(--border-light);
            padding: 12px 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .bookmark-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-hover);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .bookmark-icon img { width: 100%; height: 100%; object-fit: cover; }
        .bookmark-info { flex: 1; min-width: 0; }
        .bookmark-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .bookmark-title a { color: var(--text-primary); text-decoration: none; }
        .bookmark-desc {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .bookmark-edit-icon {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--bg-surface);
            border-radius: 20px;
            width: 28px;
            height: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 0.5px solid var(--border-light);
            z-index: 2;
        }
        body.edit-mode .bookmark-edit-icon { display: flex; }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            background: var(--bg-surface);
            border-radius: 28px;
            grid-column: span 2;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-card {
            background: var(--bg-surface);
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            padding: 24px 20px;
            border: 0.5px solid var(--border-light);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-card h3 { font-size: 1.4rem; margin-bottom: 18px; }
        .modal-card input, .modal-card textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 0.5px solid var(--border-light);
            background: var(--bg-page);
            font-size: 0.95rem;
        }
        .icon-upload-area {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .icon-preview {
            width: 52px;
            height: 52px;
            background: var(--bg-hover);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            overflow: hidden;
        }
        .upload-small-btn {
            background: var(--bg-hover);
            border: 0.5px solid var(--border-light);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .modal-buttons button {
            padding: 8px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: var(--bg-hover); color: var(--text-primary); }
        .footer-tip {
            margin-top: 32px;
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            border-top: 0.5px solid var(--border-light);
            padding-top: 18px;
        }
        .webdav-status {
            font-size: 0.7rem;
            margin-top: 6px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<!-- 设置弹窗 -->
<div id="settingsModal" class="modal">
    <div class="modal-card">
        <h3>⚙️ 设置与备份</h3>
        <div style="margin-bottom: 20px;">
            <p style="font-size: 0.85rem; margin-bottom: 12px;">📦 坚果云WebDAV同步 (跨设备)</p>
            <input type="text" id="webdavUrl" placeholder="WebDAV地址" value="https://dav.jianguoyun.com/dav/">
            <input type="text" id="webdavUser" placeholder="坚果云账号">
            <input type="password" id="webdavPass" placeholder="应用密码">
            <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                <button class="upload-small-btn" id="webdavUploadBtn">☁️ 上传</button>
                <button class="upload-small-btn" id="webdavDownloadBtn">📥 恢复</button>
            </div>
            <div id="webdavStatus" class="webdav-status"></div>
        </div>
        <div style="border-top: 0.5px solid var(--border-light); margin: 12px 0;"></div>
        <div>
            <p style="font-size: 0.85rem; margin-bottom: 12px;">💾 本地备份</p>
            <button class="upload-small-btn" id="exportDataBtn" style="width: 100%; margin-bottom: 8px;">📤 导出备份</button>
            <button class="upload-small-btn" id="importDataBtn" style="width: 100%; margin-bottom: 8px;">📥 导入备份</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
            <button class="upload-small-btn" id="resetDataBtn" style="width: 100%; background: #ffe6e6; color: var(--danger);">⚠️ 重置数据</button>
        </div>
        <div class="modal-buttons" style="margin-top: 20px;">
            <button class="btn-secondary" id="closeSettingsBtn">关闭</button>
        </div>
    </div>
</div>

<!-- 文件夹编辑弹窗 -->
<div id="folderModal" class="modal">
    <div class="modal-card"><h3>编辑文件夹</h3><input type="text" id="folderNameInput"><div class="icon-upload-area"><div class="icon-preview" id="folderIconPreview">📁</div><input type="file" id="folderIconFile" accept="image/*" style="display:none"><button type="button" class="upload-small-btn" id="uploadFolderIconBtn">上传图标</button><button type="button" class="upload-small-btn" id="clearFolderIconBtn">清除</button></div><div class="modal-buttons"><button class="btn-danger" id="deleteFolderBtn">删除</button><button class="btn-secondary" id="cancelFolderModal">取消</button><button class="btn-primary" id="saveFolderModal">保存</button></div></div>
</div>
<!-- 书签弹窗 -->
<div id="bookmarkModal" class="modal">
    <div class="modal-card"><h3 id="bookmarkModalTitle">添加书签</h3><input type="text" id="bookmarkTitle" placeholder="标题 *"><input type="text" id="bookmarkUrl" placeholder="网址"><textarea id="bookmarkDesc" rows="2" placeholder="描述"></textarea><div class="icon-upload-area"><div class="icon-preview" id="bookmarkIconPreview">🔖</div><input type="file" id="bookmarkIconFile" accept="image/*" style="display:none"><button type="button" class="upload-small-btn" id="uploadBookmarkIconBtn">上传图标</button><button type="button" class="upload-small-btn" id="clearBookmarkIconBtn">清除</button></div><div class="modal-buttons"><button class="btn-danger" id="deleteBookmarkBtn">删除</button><button class="btn-secondary" id="cancelBookmarkModal">取消</button><button class="btn-primary" id="saveBookmarkBtn">保存</button></div></div>
</div>

<script>
    // ---------- SVG 铅笔图标 (向左) ----------
    const pencilLeftSVG = `<svg class="pencil-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/><path d="M15 5l4 4"/></svg>`;
    
    let categories = [];
    let bookmarks = [];
    let currentCategoryId = null;
    let editMode = false;
    let viewState = 'folders';

    // 默认7个文件夹及图标（场记牌、书、唱片机、手机、扳手、机器人、密码箱）
    const defaultFolderConfig = [
        { name: "影视", icon: "🎬" },
        { name: "阅读", icon: "📖" },
        { name: "音乐", icon: "🎵" },
        { name: "软件", icon: "📱" },
        { name: "工具", icon: "🔧" },
        { name: "资源", icon: "🤖" },
        { name: "其它", icon: "🔐" }
    ];

    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }

    function getGoogleFavicon(url) {
        if (!url || url === '#') return null;
        try {
            let hostname = '';
            if (url.startsWith('http')) hostname = new URL(url).hostname;
            else hostname = url.split('/')[0];
            if (!hostname) return null;
            return `https://t3.gstatic.cn/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&size=64&url=https://${hostname}`;
        } catch(e) { return null; }
    }

    function getFirstLetter(str) {
        if (!str) return '📄';
        let first = str.trim().charAt(0);
        if (/[\u4e00-\u9fa5a-zA-Z0-9]/.test(first)) return first.toUpperCase();
        return '🔖';
    }

    function loadBookmarkIcon(cardElement, bookmark) {
        const iconDiv = cardElement.querySelector('.bookmark-icon');
        if (!iconDiv) return;
        if (bookmark.customIcon && bookmark.customIcon.startsWith('data:image')) {
            iconDiv.innerHTML = '';
            const img = document.createElement('img');
            img.src = bookmark.customIcon;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            iconDiv.appendChild(img);
            return;
        }
        const favUrl = getGoogleFavicon(bookmark.url);
        if (favUrl) {
            const img = new Image();
            img.onload = () => {
                iconDiv.innerHTML = '';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'contain';
                iconDiv.appendChild(img);
            };
            img.onerror = () => { iconDiv.innerHTML = getFirstLetter(bookmark.title); iconDiv.style.fontSize = '26px'; };
            img.src = favUrl;
        } else {
            iconDiv.innerHTML = getFirstLetter(bookmark.title);
            iconDiv.style.fontSize = '26px';
        }
    }

    function saveData() {
        localStorage.setItem('folder_categories_final', JSON.stringify(categories));
        localStorage.setItem('folder_bookmarks_final', JSON.stringify(bookmarks));
    }

    function loadData() {
        const storedCats = localStorage.getItem('folder_categories_final');
        const storedBookmarks = localStorage.getItem('folder_bookmarks_final');
        
        if (storedCats) {
            categories = JSON.parse(storedCats);
        } else {
            categories = [];
            for (let cfg of defaultFolderConfig) {
                categories.push({ id: genId(), name: cfg.name, customIcon: cfg.icon });
            }
        }
        
        if (storedBookmarks) {
            bookmarks = JSON.parse(storedBookmarks);
        } else {
            bookmarks = [];
        }
        
        if (!categories.length) categories = [{ id: genId(), name: "书签", customIcon: "📂" }];
        if (!currentCategoryId && categories.length) currentCategoryId = categories[0].id;
        saveData();
    }

    function getBookmarkCount(catId) { return bookmarks.filter(b => b.categoryId === catId).length; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function renderFoldersView() {
        const container = document.getElementById('appRoot');
        container.innerHTML = `
            <div class="header">
                <div class="logo-area"><h1>📁 口袋书签</h1></div>
                <div class="header-actions">
                    <button class="icon-btn" id="modeToggleBtn">${pencilLeftSVG}</button>
                    <button class="icon-btn" id="settingsGearBtn">⚙️</button>
                </div>
            </div>
            <div class="folders-grid" id="foldersGrid"></div>
            <div class="footer-tip">✎ 编辑模式可修改文件夹 | ⚙️ 坚果云跨设备同步</div>
        `;
        const grid = document.getElementById('foldersGrid');
        grid.innerHTML = '';
        
        categories.forEach(cat => {
            const count = getBookmarkCount(cat.id);
            let iconHtml = '';
            if (cat.customIcon && cat.customIcon.startsWith('data:image')) {
                iconHtml = `<img src="${cat.customIcon}" style="width:44px;height:44px;object-fit:cover">`;
            } else {
                const iconChar = cat.customIcon || "📂";
                iconHtml = `<span style="font-size:2.2rem;">${iconChar}</span>`;
            }
            const card = document.createElement('div');
            card.className = `folder-card ${currentCategoryId === cat.id ? 'active' : ''}`;
            card.innerHTML = `
                <div class="folder-icon">${iconHtml}</div>
                <div class="folder-name">${escapeHtml(cat.name)}</div>
                <div class="folder-count">${count} 个书签</div>
                <div class="folder-edit-icon">${pencilLeftSVG}</div>
            `;
            card.addEventListener('click', (e) => {
                if (e.target.closest('.folder-edit-icon')) return;
                currentCategoryId = cat.id;
                viewState = 'detail';
                renderDetailView();
            });
            const editBtn = card.querySelector('.folder-edit-icon');
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openFolderEditModal(cat.id, cat.name, cat.customIcon);
            });
            grid.appendChild(card);
        });
        
        const addCard = document.createElement('div');
        addCard.className = 'add-folder-btn';
        addCard.innerHTML = `<div class="folder-icon">➕</div><div class="folder-name">新建文件夹</div>`;
        addCard.addEventListener('click', () => addNewCategory());
        grid.appendChild(addCard);
        
        document.getElementById('modeToggleBtn').addEventListener('click', () => { editMode = !editMode; localStorage.setItem('folder_edit_mode_final', editMode); applyEditModeClass(); renderFoldersView(); });
        document.getElementById('settingsGearBtn').addEventListener('click', () => openSettingsModal());
        applyEditModeClass();
    }

    function renderDetailView() {
        const currentCat = categories.find(c => c.id === currentCategoryId);
        if (!currentCat) { viewState = 'folders'; renderFoldersView(); return; }
        const filtered = bookmarks.filter(b => b.categoryId === currentCategoryId);
        let bookmarksHtml = filtered.length === 0 ? `<div class="empty-state">✨ 暂无书签</div>` : `<div class="bookmarks-grid" id="bookmarksGrid"></div>`;
        const container = document.getElementById('appRoot');
        container.innerHTML = `
            <div class="detail-header-bar">
                <div class="back-button" id="backToFoldersBtn">← ${escapeHtml(currentCat.name)}</div>
                <div class="detail-edit-icon" id="detailModeToggleBtn">${pencilLeftSVG}</div>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;"><button class="add-bookmark-btn" id="detailAddBookmarkBtn">➕ 新书签</button></div>
            <div id="detailBookmarksContainer">${bookmarksHtml}</div>
        `;
        if (filtered.length > 0) {
            const grid = document.getElementById('bookmarksGrid');
            filtered.forEach(book => {
                const card = document.createElement('div');
                card.className = 'bookmark-card';
                card.innerHTML = `<div class="bookmark-icon"></div><div class="bookmark-info"><div class="bookmark-title"><a href="${escapeHtml(book.url)}" target="_blank">${escapeHtml(book.title)}</a></div><div class="bookmark-desc">${book.description || '暂无描述'}</div></div><div class="bookmark-edit-icon">${pencilLeftSVG}</div>`;
                grid.appendChild(card);
                loadBookmarkIcon(card, book);
                const editIcon = card.querySelector('.bookmark-edit-icon');
                editIcon.addEventListener('click', (e) => { e.stopPropagation(); openBookmarkModal(book.id); });
                card.addEventListener('click', (e) => { if (!e.target.closest('.bookmark-edit-icon') && book.url !== '#') window.open(book.url, '_blank'); });
            });
        }
        document.getElementById('backToFoldersBtn').addEventListener('click', () => { viewState = 'folders'; renderFoldersView(); });
        document.getElementById('detailModeToggleBtn').addEventListener('click', () => { editMode = !editMode; localStorage.setItem('folder_edit_mode_final', editMode); applyEditModeClass(); renderDetailView(); });
        document.getElementById('detailAddBookmarkBtn')?.addEventListener('click', () => openBookmarkModal(null));
        applyEditModeClass();
    }

    function applyEditModeClass() {
        if (editMode) document.body.classList.add('edit-mode');
        else document.body.classList.remove('edit-mode');
    }

    // WebDAV 同步函数
    async function webdavRequest(method, path, data = null, user, pass, urlPrefix) {
        const fullUrl = urlPrefix.replace(/\/$/, '') + '/' + path.replace(/^\//, '');
        const headers = { 'Content-Type': 'application/json' };
        const options = { method, headers };
        if (data) options.body = JSON.stringify(data);
        const auth = btoa(`${user}:${pass}`);
        options.headers['Authorization'] = `Basic ${auth}`;
        const response = await fetch(fullUrl, options);
        if (!response.ok && method !== 'GET') throw new Error(`HTTP ${response.status}`);
        if (method === 'GET') {
            if (response.status === 404) return null;
            return await response.json();
        }
        return { success: true };
    }

    async function uploadToWebDAV() {
        const url = document.getElementById('webdavUrl').value.trim();
        const user = document.getElementById('webdavUser').value.trim();
        const pass = document.getElementById('webdavPass').value.trim();
        if (!url || !user || !pass) { showWebdavStatus("请填写完整信息", true); return; }
        showWebdavStatus("上传中...", false);
        try {
            const exportData = { categories, bookmarks, version: '1.0', updatedAt: new Date().toISOString() };
            await webdavRequest('PUT', 'bookmark_backup.json', exportData, user, pass, url);
            showWebdavStatus("✅ 上传成功", false);
        } catch(e) { showWebdavStatus("❌ 失败: " + e.message, true); }
    }

    async function downloadFromWebDAV() {
        const url = document.getElementById('webdavUrl').value.trim();
        const user = document.getElementById('webdavUser').value.trim();
        const pass = document.getElementById('webdavPass').value.trim();
        if (!url || !user || !pass) { showWebdavStatus("请填写完整信息", true); return; }
        showWebdavStatus("下载中...", false);
        try {
            const data = await webdavRequest('GET', 'bookmark_backup.json', null, user, pass, url);
            if (!data || !data.categories || !data.bookmarks) throw new Error("文件格式错误");
            categories = data.categories;
            bookmarks = data.bookmarks;
            if (!categories.length) categories = [{ id: genId(), name: "书签" }];
            if (!currentCategoryId || !categories.find(c => c.id === currentCategoryId)) currentCategoryId = categories[0].id;
            saveData();
            showWebdavStatus("✅ 恢复成功", false);
            if (viewState === 'folders') renderFoldersView();
            else renderDetailView();
        } catch(e) { showWebdavStatus("❌ 失败: " + e.message, true); }
    }

    function showWebdavStatus(msg, isError) {
        const statusDiv = document.getElementById('webdavStatus');
        if (statusDiv) { statusDiv.innerText = msg; statusDiv.style.color = isError ? 'var(--danger)' : 'var(--accent)'; }
        setTimeout(() => { if(statusDiv) statusDiv.innerText = ''; }, 3000);
    }

    function exportBackup() {
        const exportData = { categories, bookmarks, version: '1.0', exportTime: new Date().toISOString() };
        const dataStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bookmark_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.categories && imported.bookmarks) {
                    categories = imported.categories;
                    bookmarks = imported.bookmarks;
                    if (!categories.length) categories = [{ id: genId(), name: "书签" }];
                    if (!currentCategoryId || !categories.find(c => c.id === currentCategoryId)) currentCategoryId = categories[0].id;
                    saveData();
                    alert("导入成功");
                    if (viewState === 'folders') renderFoldersView();
                    else renderDetailView();
                } else { alert("文件格式不正确"); }
            } catch(err) { alert("解析失败"); }
        };
        reader.readAsText(file);
    }
    function resetAllData() {
        if (confirm("⚠️ 删除所有数据，恢复默认？不可撤销！")) {
            localStorage.removeItem('folder_categories_final');
            localStorage.removeItem('folder_bookmarks_final');
            loadData();
            currentCategoryId = categories[0]?.id;
            if (viewState === 'folders') renderFoldersView();
            else renderDetailView();
        }
    }

    // 文件夹编辑
    let editingFolderId = null, tempFolderIcon = null;
    function openFolderEditModal(id, name, currentIcon) {
        editingFolderId = id;
        document.getElementById('folderNameInput').value = name;
        tempFolderIcon = currentIcon || null;
        const preview = document.getElementById('folderIconPreview');
        if (tempFolderIcon && tempFolderIcon.startsWith('data:image')) {
            preview.innerHTML = '';
            const img = document.createElement('img');
            img.src = tempFolderIcon;
            img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover';
            preview.appendChild(img);
        } else {
            preview.innerHTML = tempFolderIcon || "📂";
            preview.style.fontSize = '32px';
        }
        document.getElementById('folderModal').style.display = 'flex';
    }
    function saveFolderEdit() {
        const newName = document.getElementById('folderNameInput').value.trim();
        if (!newName) return alert("名称不能为空");
        const cat = categories.find(c => c.id === editingFolderId);
        if (cat) {
            cat.name = newName;
            if (tempFolderIcon) cat.customIcon = tempFolderIcon;
        }
        saveData();
        if (viewState === 'folders') renderFoldersView(); else renderDetailView();
        closeFolderModal();
    }
    function deleteFolder() {
        if (categories.length === 1) return alert("至少保留一个分类");
        if (confirm("删除文件夹及其中的所有书签？")) {
            bookmarks = bookmarks.filter(b => b.categoryId !== editingFolderId);
            categories = categories.filter(c => c.id !== editingFolderId);
            if (currentCategoryId === editingFolderId) currentCategoryId = categories[0].id;
            saveData();
            if (viewState === 'folders') renderFoldersView(); else { viewState = 'folders'; renderFoldersView(); }
            closeFolderModal();
        }
    }
    function closeFolderModal() { document.getElementById('folderModal').style.display = 'none'; editingFolderId = null; tempFolderIcon = null; }
    
    function addNewCategory() {
        let newName = prompt("输入文件夹名称", "新文件夹");
        if (newName && newName.trim()) {
            categories.push({ id: genId(), name: newName.trim(), customIcon: "📂" });
            saveData();
            if (viewState === 'folders') renderFoldersView();
        }
    }

    // 书签弹窗
    let editingBookId = null, tempBookIcon = null;
    function openBookmarkModal(bookId = null) {
        editingBookId = bookId;
        tempBookIcon = null;
        if (bookId === null) {
            document.getElementById('bookmarkModalTitle').innerText = '添加书签';
            document.getElementById('bookmarkTitle').value = '';
            document.getElementById('bookmarkUrl').value = '';
            document.getElementById('bookmarkDesc').value = '';
            document.getElementById('bookmarkIconPreview').innerHTML = '🔖';
            document.getElementById('deleteBookmarkBtn').style.opacity = '0.5';
            document.getElementById('deleteBookmarkBtn').style.pointerEvents = 'none';
        } else {
            const book = bookmarks.find(b => b.id === bookId);
            if (book) {
                document.getElementById('bookmarkModalTitle').innerText = '编辑书签';
                document.getElementById('bookmarkTitle').value = book.title;
                document.getElementById('bookmarkUrl').value = book.url;
                document.getElementById('bookmarkDesc').value = book.description || '';
                const preview = document.getElementById('bookmarkIconPreview');
                if (book.customIcon && book.customIcon.startsWith('data:image')) {
                    preview.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = book.customIcon;
                    img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover';
                    preview.appendChild(img);
                    tempBookIcon = book.customIcon;
                } else { preview.innerHTML = getFirstLetter(book.title); preview.style.fontSize = '28px'; }
            }
            document.getElementById('deleteBookmarkBtn').style.opacity = '1';
            document.getElementById('deleteBookmarkBtn').style.pointerEvents = 'auto';
        }
        document.getElementById('bookmarkModal').style.display = 'flex';
    }
    function saveBookmark() {
        const title = document.getElementById('bookmarkTitle').value.trim();
        const url = document.getElementById('bookmarkUrl').value.trim();
        const desc = document.getElementById('bookmarkDesc').value.trim();
        if (!title || !url) { alert("标题和网址不能为空"); return; }
        const newData = { title, url, description: desc };
        if (tempBookIcon) newData.customIcon = tempBookIcon;
        if (editingBookId === null) bookmarks.push({ id: genId(), categoryId: currentCategoryId, ...newData });
        else { const idx = bookmarks.findIndex(b => b.id === editingBookId); if (idx !== -1) bookmarks[idx] = { ...bookmarks[idx], ...newData }; }
        saveData();
        if (viewState === 'detail') renderDetailView();
        closeBookmarkModal();
    }
    function deleteBookmark() {
        if (editingBookId === null) return;
        if (confirm("永久删除该书签？")) {
            bookmarks = bookmarks.filter(b => b.id !== editingBookId);
            saveData();
            if (viewState === 'detail') renderDetailView();
            closeBookmarkModal();
        }
    }
    function closeBookmarkModal() { document.getElementById('bookmarkModal').style.display = 'none'; editingBookId = null; tempBookIcon = null; }

    function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }

    function initModals() {
        document.getElementById('exportDataBtn')?.addEventListener('click', exportBackup);
        document.getElementById('importDataBtn')?.addEventListener('click', () => document.getElementById('importFileInput').click());
        document.getElementById('importFileInput')?.addEventListener('change', (e) => { if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value = ''; });
        document.getElementById('resetDataBtn')?.addEventListener('click', resetAllData);
        document.getElementById('closeSettingsBtn')?.addEventListener('click', closeSettingsModal);
        document.getElementById('webdavUploadBtn')?.addEventListener('click', uploadToWebDAV);
        document.getElementById('webdavDownloadBtn')?.addEventListener('click', downloadFromWebDAV);
        document.getElementById('uploadFolderIconBtn')?.addEventListener('click', () => document.getElementById('folderIconFile').click());
        document.getElementById('clearFolderIconBtn')?.addEventListener('click', () => { tempFolderIcon = null; document.getElementById('folderIconPreview').innerHTML = '📁'; });
        document.getElementById('folderIconFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { tempFolderIcon = ev.target.result; const preview = document.getElementById('folderIconPreview'); preview.innerHTML = ''; const img = document.createElement('img'); img.src = tempFolderIcon; img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover'; preview.appendChild(img); };
            reader.readAsDataURL(file);
        });
        document.getElementById('saveFolderModal')?.addEventListener('click', saveFolderEdit);
        document.getElementById('cancelFolderModal')?.addEventListener('click', closeFolderModal);
        document.getElementById('deleteFolderBtn')?.addEventListener('click', deleteFolder);
        document.getElementById('uploadBookmarkIconBtn')?.addEventListener('click', () => document.getElementById('bookmarkIconFile').click());
        document.getElementById('clearBookmarkIconBtn')?.addEventListener('click', () => { tempBookIcon = null; const preview = document.getElementById('bookmarkIconPreview'); preview.innerHTML = getFirstLetter(document.getElementById('bookmarkTitle').value.trim() || '🔖'); preview.style.fontSize = '28px'; });
        document.getElementById('bookmarkIconFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { tempBookIcon = ev.target.result; const preview = document.getElementById('bookmarkIconPreview'); preview.innerHTML = ''; const img = document.createElement('img'); img.src = tempBookIcon; img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover'; preview.appendChild(img); };
            reader.readAsDataURL(file);
        });
        document.getElementById('saveBookmarkBtn')?.addEventListener('click', saveBookmark);
        document.getElementById('cancelBookmarkModal')?.addEventListener('click', closeBookmarkModal);
        document.getElementById('deleteBookmarkBtn')?.addEventListener('click', deleteBookmark);
        document.getElementById('settingsModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('settingsModal')) closeSettingsModal(); });
        document.getElementById('folderModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('folderModal')) closeFolderModal(); });
        document.getElementById('bookmarkModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('bookmarkModal')) closeBookmarkModal(); });
    }

    function init() {
        loadData();
        editMode = localStorage.getItem('folder_edit_mode_final') === 'true';
        applyEditModeClass();
        initModals();
        viewState = 'folders';
        renderFoldersView();
    }
    init();
</script>
</body>
